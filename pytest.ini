[pytest]
# Configurações do pytest para o projeto

# Diretórios para testes
testpaths = tests

# Padrão de nomenclatura para testes
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70

# Marcadores personalizados
markers =
    unit: Teste unitário
    integration: Teste de integração
    slow: Teste que demora mais tempo
    requires_api: Teste que requer API externa
    smoke: Teste de fumaça (essencial)

# Timeout para testes
timeout = 300

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s

# Mínimo de warns esperado
minversion = 7.0
